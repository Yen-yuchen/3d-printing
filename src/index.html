<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Canvas Viewer</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
<div id="app">
    <aside id="sidebar">
        <h2>Settings</h2>

        <label class="btn upload-btn">
            Upload model (single .glb/.stl/.obj or a .gltf package)
            <!--
              For .gltf packages, select the .gltf AND all referenced files (.bin/.png/.jpg/etc)
              in the same upload selection.
            -->
            <input id="fileInput" type="file" accept=".stl,.obj,.gltf,.glb,.bin,.png,.jpg,.jpeg" multiple hidden />
        </label>

        <div id="status" class="muted">No file loaded.</div>

        <div class="toggle-row">
            <label class="toggle">
                <input id="gridToggle" type="checkbox" checked />
                Show grid
            </label>

            <label class="toggle">
                <input id="modelToggle" type="checkbox" checked />
                Show model
            </label>

            <label class="toggle">
                <input id="wireToggle" type="checkbox" />
                Wireframe
            </label>
        </div>

        <label>
            Scale
            <input id="scale" type="range" min="10" max="300" value="100" />
        </label>
        <button id="btn-simulation" class="btn btn-sm">Simulate Deformation</button>
        <button id="btn-settings" class="btn btn-sm">Constraints Settings</button>

        <button id="resetCam">Reset Camera</button>
    </aside>

    <main id="viewer"></main>
</div>

<script type="module" src="/app.ts"></script>
</body>
</html>
