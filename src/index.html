<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meshmixer Style Viewer</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div id="app">
    <nav id="main-toolbar">
        
        
        <button class="tool-btn active" data-target="panel-import" title="Import">
            <i class="fa-solid fa-folder-open"></i>
            <span>Import</span>
        </button>

        <button class="tool-btn" data-target="panel-edit" title="Edit">
            <i class="fa-solid fa-screwdriver-wrench"></i>
            <span>Edit</span>
        </button>

        <button class="tool-btn" data-target="panel-view" title="View">
            <i class="fa-solid fa-eye"></i>
            <span>View</span>
        </button>

        <button class="tool-btn" data-target="panel-analysis" title="Analysis">
            <i class="fa-solid fa-chart-line"></i>
            <span>Analysis</span>
        </button>
    </nav>

    <aside id="tool-panel">
        
        <div id="panel-header">Import</div>

        <div id="panel-import" class="tool-group active">
            <div class="control-group">
                <label class="btn-primary">
                    <i class="fa-solid fa-upload"></i> Import Model
                    <input id="fileInput" type="file" accept=".stl,.obj,.gltf,.glb,.bin,.png,.jpg,.jpeg" multiple hidden />
                </label>
                <div id="status" class="status-text">No file loaded</div>
            </div>
        </div>

    <div id="panel-edit" class="tool-group">

        <div class="control-group">
            <label class="label-title">Mesh Density </label>
        
            <div class="slider-container">
                <span style="font-size: 12px; color: #888;">Low</span>
                <input id="meshDensitySlider" type="range" min="0.05" max="1" step="0.05" value="1" />
                <span style="font-size: 12px; color: #888;">High</span>
            </div>
        
            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <span id="meshDensityValue" style="color: #ff9800; font-weight: bold;">100%</span>
                <span id="polyCount" style="color: #666; font-size: 10px;">Faces: 0</span>
            </div>
        </div>
    </div>
        <div id="panel-view" class="tool-group">
            <div class="control-group">
                <label class="toggle-row">
                    <span>Show Grid</span>
                    <input id="gridToggle" type="checkbox" checked />
                </label>
                <label class="toggle-row">
                    <span>Show Model</span>
                    <input id="modelToggle" type="checkbox" checked />
                </label>
                <label class="toggle-row">
                    <span>Wireframe</span>
                    <input id="wireToggle" type="checkbox" />
                </label>
            </div>
            <div class="control-group">
                <button id="resetCam" class="btn-tool">Reset Camera</button>
            </div>
        </div>

        <div id="panel-analysis" class="tool-group">
             <div class="control-group">
                <button id="btn-simulation" class="btn-tool">Simulate Deformation</button>
                <button id="btn-settings" class="btn-tool">Constraints Settings</button>
             </div>
        </div>
    </aside>

    <main id="viewer"></main>
</div>

<script>
    const buttons = document.querySelectorAll('.tool-btn');
    const groups = document.querySelectorAll('.tool-group');
    const header = document.getElementById('panel-header');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            
            buttons.forEach(b => b.classList.remove('active'));
            groups.forEach(g => g.classList.remove('active'));

            
            btn.classList.add('active');
            const targetId = btn.getAttribute('data-target');
            document.getElementById(targetId).classList.add('active');
            
            
            header.textContent = btn.querySelector('span').innerText;
        });
    });

    
    const scaleInput = document.getElementById('scale');
    const scaleVal = document.getElementById('scale-val');
    if(scaleInput && scaleVal) {
        scaleInput.addEventListener('input', (e) => {
            scaleVal.textContent = e.target.value + '%';
        });
    }
</script>

<script type="module" src="/app.ts"></script>
</body>
</html>
