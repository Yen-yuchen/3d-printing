<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Model Viewer</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="app">
      <nav id="main-toolbar">
        <button
          class="tool-btn active"
          data-target="panel-import"
          title="Import"
        >
          <i class="fa-solid fa-folder-open"></i>
          <span>Import</span>
        </button>

        <button class="tool-btn" data-target="panel-edit" title="Edit">
          <i class="fa-solid fa-screwdriver-wrench"></i>
          <span>Edit</span>
        </button>

        <button class="tool-btn" data-target="panel-view" title="View">
          <i class="fa-solid fa-eye"></i>
          <span>View</span>
        </button>

        <button class="tool-btn" data-target="panel-analysis" title="Analysis">
          <i class="fa-solid fa-chart-line"></i>
          <span>Analysis</span>
        </button>
      </nav>

      <aside id="tool-panel">
        <div id="panel-header">Import</div>

        <div id="panel-import" class="tool-group active">
          <div class="control-group">
            <label class="btn-primary">
              <i class="fa-solid fa-upload"></i> Import Model
              <input
                id="fileInput"
                type="file"
                accept=".stl,.obj,.gltf,.glb,.bin,.png,.jpg,.jpeg"
                multiple
                hidden
              />
            </label>
            <div id="status" class="status-text">No file loaded</div>
          </div>

          <!-- Auth (email check) -->
          <div class="control-group" style="margin-top: 14px">
            <div id="loggedOutPannel">
              <a
                id="createUserLink"
                class="btn-tool"
                href="/create-user.html"
                target="_blank"
                rel="noopener noreferrer"
              >
                Create Account
              </a>

              <div class="form-group" style="margin-top: 10px">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="example@email.com"
                  required
                />
              </div>

              <button id="loginBtn" class="btn-tool" style="margin-top: 10px">
                Login
              </button>
            </div>

            <label class="label-title">Export </label>
	    <div style="gap: 10px">
	    <input type="text" id="newModelName" placeholder="Enter model's new name">
	    </input>
	    </div>
            <div style="display: flex; gap: 5px">
              <button
                id="btnExportGLB"
                class="btn-tool"
                style="flex: 1; background-color: #007acc"
              >
                <i class="fa-solid fa-download"></i> .GLB
              </button>
              <button
                id="btnExportOBJ"
                class="btn-tool"
                style="flex: 1; background-color: #007acc"
              >
                <i class="fa-solid fa-download"></i> .OBJ
              </button>
	      <button id="btnLocalSave"
		      class="btn-tool"
		      style="flex: 1; background-color: #007acc">
		      <label><i class="fa-solid fa-download"></i> Local Save</label>
		</button>
            </div>

            <div id="loggedInPannel" style="display: none; margin-top: 10px">
              <div class="control-group">
                <span id="welcomeMsg">Welcome!</span>
              </div>
              <button id="logoutBtn" class="btn-tool" style="margin-top: 10px">
                Logout
              </button>
            </div>
          </div>
        </div>

        <div id="panel-edit" class="tool-group">
          <div class="control-group">
            <label class="label-title">Scale</label>
            <div class="slider-container">
              <input id="scale" type="range" min="10" max="300" value="100" />
              <span id="scale-val">100%</span>
            </div>
          </div>

          <div class="control-group">
            <label class="label-title">Reduce</label>

            <div style="margin-bottom: 10px">
              <span style="font-size: 12px; color: #aaa">Reduce Type</span>
              <select
                id="reduceType"
                style="
                  width: 100%;
                  background: #333;
                  color: white;
                  border: 1px solid #555;
                  padding: 5px;
                "
              >
                <option value="preserve">Shape Preserving</option>
              </select>
            </div>
<!--            <div style="margin-bottom: 10px">-->
<!--              <span style="font-size: 12px; color: #aaa">Reduce Type</span>-->
<!--              <select-->
<!--                id="reduceType"-->
<!--                style="-->
<!--                  width: 100%;-->
<!--                  background: #333;-->
<!--                  color: white;-->
<!--                  border: 1px solid #555;-->
<!--                  padding: 5px;-->
<!--                "-->
<!--              >-->
<!--                <option value="preserve">Shape Preserving</option>-->
<!--              </select>-->
<!--            </div>-->

            <div style="margin-bottom: 10px">
              <span style="font-size: 12px; color: #aaa">Reduce Target</span>
              <select
                id="reduceTargetMode"
                style="
                  width: 100%;
                  background: #333;
                  color: white;
                  border: 1px solid #555;
                  padding: 5px;
                "
              >
                <option value="percentage">Percentage (percentage)</option>
                <option value="budget">Triangle Budget (side count)</option>
              </select>
            </div>

            <div id="control-percentage" style="display: block">
              <div class="slider-container">
                <span style="font-size: 10px; color: #888">0%</span>
                <input
                  id="meshDensitySlider"
                  type="range"
                  min="30"
                  max="100"
                  step="1"
                  value="100"
                />
                <span style="font-size: 10px; color: #888">100%</span>
              </div>
              <div
                style="
                  text-align: right;
                  color: #ff9800;
                  font-weight: bold;
                  font-size: 14px;
                  margin-top: 5px;
                "
              >
                <span id="meshDensityValue">100%</span>
              </div>
            </div>

            <div id="control-budget" style="display: none; margin-top: 10px">
              <div style="display: flex; gap: 5px; align-items: center">
                <input
                  id="polyBudgetInput"
                  type="number"
                  min="10"
                  step="100"
                  style="
                    flex-grow: 1;
                    background: #222;
                    border: 1px solid #555;
                    color: #ff9800;
                    padding: 5px;
                    text-align: right;
                  "
                  placeholder="Target Count"
                />
                <span style="font-size: 12px; color: #888">Verts</span>
              </div>
              <div
                style="
                  font-size: 10px;
                  color: #666;
                  text-align: right;
                  margin-top: 2px;
                "
              >
                Original: <span id="originalCountLabel">0</span>
              </div>
              <button
                id="btnApplyBudget"
                class="btn-tool"
                style="margin-top: 5px"
              >
                Apply Budget
              </button>
            </div>

            <div
              style="
                margin-top: 10px;
                border-top: 1px solid #444;
                padding-top: 5px;
              "
            >
              <span id="polyCount" style="color: #888; font-size: 11px"
                >Current Vertices: 0</span
              >
            </div>

            <label class="label-title">Mesh Subdivision</label>

            <div style="margin-bottom: 10px">
              <span style="font-size: 12px; color: #aaa">Max Edge Length</span>
              <div class="slider-container">
                <span style="font-size: 10px; color: #888">0.1</span>
                <input
                  id="subdivisionEdgeSlider"
                  type="range"
                  min="0.1"
                  max="2.0"
                  step="0.1"
                  value="0.5"
                />
                <span style="font-size: 10px; color: #888">2.0</span>
              </div>
              <div
                style="
                  text-align: right;
                  color: #ff9800;
                  font-weight: bold;
                  font-size: 14px;
                  margin-top: 5px;
                "
              >
                <span id="subdivisionEdgeValue">0.5</span>
              </div>
            </div>

            <div style="margin-bottom: 10px">
              <span style="font-size: 12px; color: #aaa">Iterations</span>
              <div style="display: flex; gap: 5px; align-items: center">
                <input
                  id="subdivisionIterInput"
                  type="number"
                  min="1"
                  max="5"
                  step="1"
                  value="2"
                  style="
                    flex-grow: 1;
                    background: #222;
                    border: 1px solid #555;
                    color: #ff9800;
                    padding: 5px;
                    text-align: right;
                  "
                  placeholder="Iterations"
                />
              </div>
            </div>

            <button id="btnSubdivision" class="btn-tool" style="width: 100%">
              <i class="fa-solid fa-expand"></i> Apply Subdivision
            </button>

            <label class="label-title">Checkpoint </label>
            <div style="display: flex; gap: 5px">
              <!-- <button id="btnSaveCheckpoint" class="btn-tool" style="flex: 1"> -->
              <button id="btnSaveModel" class="btn-tool" style="flex: 1">
                <i class="fa-solid fa-floppy-disk"></i> Save
              </button>
              <button
                id="btnRestoreCheckpoint"
                class="btn-tool"
                style="flex: 1"
                disabled
              >
                <i class="fa-solid fa-rotate-left"></i> Restore
              </button>
            </div>

            <button
              id="btnToggleCheckpoint"
              class="btn-tool"
              style="margin-top: 5px"
              disabled
            >
              <i class=""></i> Show/Hide Overlay
            </button>

            <div
              id="checkpointStatus"
              style="
                font-size: 11px;
                color: #666;
                margin-top: 5px;
                text-align: center;
              "
            >
              No checkpoint saved
            </div>
          </div>
        </div>

        <div id="panel-view" class="tool-group">
          <div class="control-group">
            <label class="toggle-row">
              <span>Background Color</span>
              <input
                id="bgColorPicker"
                type="color"
                value="#111111"
                style="
                  cursor: pointer;
                  height: 25px;
                  width: 50px;
                  border: none;
                  padding: 0;
                "
              />
            </label>
            <label class="toggle-row">
              <span>Show Grid</span>
              <input id="gridToggle" type="checkbox" checked />
            </label>
            <label class="toggle-row">
              <span>Show Model</span>
              <input id="modelToggle" type="checkbox" checked />
            </label>
            <label class="toggle-row">
              <span>Wireframe</span>
              <input id="wireToggle" type="checkbox" />
            </label>
          </div>
          <div class="control-group">
            <button id="resetCam" class="btn-tool">Reset Camera</button>
          </div>
        </div>

        <div id="panel-analysis" class="tool-group">
          <div class="control-group">
            <button id="btn-simulation" class="btn-tool">
              Simulate Deformation
            </button>
            <button id="btn-settings" class="btn-tool">
              Constraints Settings
            </button>
          </div>
          <div class="control-group">
            <label class="label-title">Simulation </label>
            <button
              id="btnStressAnalysis"
              class="btn-tool"
              title="Simulate Von Mises Stress"
            >
              <i class=""></i> Show Von Mises Stress
            </button>
            <div style="font-size: 10px; color: #888; margin-top: 5px">
              * Red indicates high simulated stress
            </div>
          </div>
        </div>
      </aside>

      <main id="viewer"></main>
      <div id="stress-legend" style="display: none; position: absolute; right: 20px; bottom: 30px; background: rgba(20,20,20,0.85); color: #fff; padding: 15px; border-radius: 8px; border: 1px solid #444; z-index: 1000; font-family: sans-serif; font-size: 12px; pointer-events: none;">
          <div style="text-align: center; margin-bottom: 8px; font-weight: bold; color: #ff9800;">Von Mises Stress</div>
          <div style="display: flex; height: 150px;">
              <div style="width: 20px; background: linear-gradient(to top, blue, cyan, lime, yellow, red); border: 1px solid #666; border-radius: 3px;"></div>
              <div style="display: flex; flex-direction: column; justify-content: space-between; margin-left: 10px;">
                  <span style="color: #ff4444; font-weight: bold;">High (Max)</span>
                  <span style="color: #ffff00;">Medium</span>
                  <span style="color: #44aaff; font-weight: bold;">Low (Min)</span>
              </div>
          </div>
      </div>
      </div>
    </div>

    <script>
      const buttons = document.querySelectorAll(".tool-btn");
      const groups = document.querySelectorAll(".tool-group");
      const header = document.getElementById("panel-header");

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          buttons.forEach((b) => b.classList.remove("active"));
          groups.forEach((g) => g.classList.remove("active"));

          btn.classList.add("active");
          const targetId = btn.getAttribute("data-target");
          document.getElementById(targetId).classList.add("active");

          header.textContent = btn.querySelector("span").innerText;
        });
      });

      const scaleInput = document.getElementById("scale");
      const scaleVal = document.getElementById("scale-val");
      if (scaleInput && scaleVal) {
        scaleInput.addEventListener("input", (e) => {
          scaleVal.textContent = e.target.value + "%";
        });
      }
    </script>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
